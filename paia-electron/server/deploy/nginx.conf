# nginx site config for the PAiA license server.
#
# Drop this in /etc/nginx/sites-available/paia-license.conf, then:
#   sudo ln -s /etc/nginx/sites-available/paia-license.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d license.paia.app
#   sudo systemctl reload nginx
#
# certbot will rewrite the http server block to redirect to https
# automatically.

server {
    listen 80;
    listen [::]:80;
    server_name license.paia.app;

    # certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name license.paia.app;

    # SSL — populated by certbot
    # ssl_certificate /etc/letsencrypt/live/license.paia.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/license.paia.app/privkey.pem;

    # Logs
    access_log /var/log/nginx/paia-license.access.log;
    error_log  /var/log/nginx/paia-license.error.log;

    # Reasonable defaults
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 30s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Block everything except the webhook + health endpoints. The
    # license server only handles three URLs; everything else is a
    # 404 by definition. Drop them at the edge to reduce noise in
    # the application logs.
    location = /health                  { proxy_pass http://127.0.0.1:8787; }
    location = /webhook/stripe          { proxy_pass http://127.0.0.1:8787; }
    location = /webhook/lemonsqueezy    { proxy_pass http://127.0.0.1:8787; }

    location / {
        return 404;
    }

    # Proxy settings shared by all locations above.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering on;
    proxy_buffering off;
    proxy_read_timeout 30s;
}
