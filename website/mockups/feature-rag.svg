<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="PAiA RAG knowledge collection panel showing a PDF being asked about with cited responses">
  <defs>
    <linearGradient id="ragPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2230"/>
      <stop offset="100%" stop-color="#161a22"/>
    </linearGradient>
    <filter id="ragShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="320" fill="#0a0a0b"/>

  <g filter="url(#ragShadow)">
    <rect x="20" y="20" width="440" height="280" rx="10" fill="url(#ragPanel)" stroke="#2a3142"/>

    <!-- header -->
    <rect x="20" y="20" width="440" height="36" rx="10" fill="#1a1f2b"/>
    <rect x="20" y="46" width="440" height="10" fill="#1a1f2b"/>
    <line x1="20" y1="56" x2="460" y2="56" stroke="#2a3142"/>
    <text x="38" y="42" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" font-weight="600" fill="#e6e9ef">📚 Travel guides · attached</text>
    <circle cx="436" cy="38" r="3" fill="#4ade80"/>
    <text x="444" y="42" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">218 chunks</text>

    <!-- user prompt -->
    <rect x="160" y="74" width="280" height="36" rx="10" fill="rgba(106,166,255,0.18)"/>
    <text x="172" y="90" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#e6e9ef">What's the best ramen spot in Tokyo</text>
    <text x="172" y="103" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#e6e9ef">according to my saved guides?</text>

    <!-- assistant response with citations -->
    <rect x="40" y="120" width="400" height="160" rx="10" fill="#1a2334" stroke="#2a3142"/>

    <text x="52" y="138" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#e6e9ef">Based on your saved guides:</text>

    <text x="52" y="158" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#e6e9ef">Three places stand out:</text>

    <text x="62" y="176" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">1. <tspan font-weight="600" fill="#e6e9ef">Tsuta</tspan> (Sugamo) — first ramen shop with</text>
    <text x="74" y="188" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">a Michelin star <tspan fill="#6aa6ff" font-weight="600">[1]</tspan></text>

    <text x="62" y="206" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">2. <tspan font-weight="600" fill="#e6e9ef">Afuri</tspan> (Ebisu) — yuzu shio ramen,</text>
    <text x="74" y="218" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">lighter style <tspan fill="#6aa6ff" font-weight="600">[2]</tspan></text>

    <text x="62" y="236" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">3. <tspan font-weight="600" fill="#e6e9ef">Ichiran</tspan> (Shibuya) — solo booths,</text>
    <text x="74" y="248" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">tonkotsu, open 24h <tspan fill="#6aa6ff" font-weight="600">[3]</tspan></text>

    <!-- citation footer -->
    <line x1="52" y1="258" x2="428" y2="258" stroke="#2a3142"/>
    <text x="52" y="270" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">[1] tokyo-eats.pdf p.14 · [2] afuri-review.md · [3] ichiran-night.pdf</text>
  </g>
</svg>
