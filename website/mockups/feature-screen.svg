<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="PAiA region capture overlay with a selection rectangle and a question about what's on screen">
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2034"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="screenPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2230"/>
      <stop offset="100%" stop-color="#161a22"/>
    </linearGradient>
    <pattern id="dimGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="rgba(0,0,0,0.35)"/>
    </pattern>
    <filter id="screenShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="320" fill="url(#screenBg)"/>

  <!-- a fake desktop window in the background -->
  <g opacity="0.8">
    <rect x="40" y="50" width="280" height="180" rx="6" fill="#0f1115" stroke="#2a3142"/>
    <rect x="40" y="50" width="280" height="22" rx="6" fill="#1a1f2b"/>
    <circle cx="54" cy="61" r="3.5" fill="#ff5f56"/>
    <circle cx="66" cy="61" r="3.5" fill="#ffbd2e"/>
    <circle cx="78" cy="61" r="3.5" fill="#27c93f"/>
    <text x="160" y="65" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7" text-anchor="middle">analytics-dashboard.com</text>

    <!-- chart bars -->
    <text x="56" y="92" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" font-weight="600" fill="#e6e9ef">Q3 revenue</text>
    <rect x="56" y="106" width="20" height="60" fill="#6aa6ff"/>
    <rect x="86" y="120" width="20" height="46" fill="#6aa6ff"/>
    <rect x="116" y="98" width="20" height="68" fill="#6aa6ff"/>
    <rect x="146" y="86" width="20" height="80" fill="#4ade80"/>
    <rect x="176" y="110" width="20" height="56" fill="#6aa6ff"/>
    <rect x="206" y="92" width="20" height="74" fill="#6aa6ff"/>
    <rect x="236" y="76" width="20" height="90" fill="#4ade80"/>
    <rect x="266" y="68" width="20" height="98" fill="#4ade80"/>

    <line x1="56" y1="166" x2="296" y2="166" stroke="#2a3142"/>
    <text x="64" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Jul</text>
    <text x="94" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Aug</text>
    <text x="124" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Sep</text>
    <text x="154" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Oct</text>
    <text x="184" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Nov</text>
    <text x="214" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Dec</text>
    <text x="244" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Jan</text>
    <text x="274" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="8" fill="#8b94a7">Feb</text>

    <text x="56" y="202" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">Total: $1.84M · +23% YoY</text>
  </g>

  <!-- dim overlay (region capture mode) -->
  <rect width="480" height="320" fill="rgba(0,0,0,0.4)"/>

  <!-- selection rectangle -->
  <rect x="50" y="80" width="260" height="140" fill="rgba(106,166,255,0.08)" stroke="#6aa6ff" stroke-width="2"/>

  <!-- size badge -->
  <rect x="50" y="60" width="56" height="16" rx="3" fill="#6aa6ff"/>
  <text x="78" y="72" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="600" fill="#0a0d14" text-anchor="middle">260 × 140</text>

  <!-- hint badge -->
  <rect x="160" y="14" width="180" height="22" rx="11" fill="rgba(0,0,0,0.7)" stroke="rgba(255,255,255,0.2)"/>
  <text x="250" y="29" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Drag to select · Esc to cancel</text>

  <!-- ── result panel popping in ───────────────────── -->
  <g filter="url(#screenShadow)" transform="translate(330, 70)">
    <rect x="0" y="0" width="140" height="220" rx="10" fill="url(#screenPanel)" stroke="#2a3142"/>
    <rect x="0" y="0" width="140" height="28" rx="10" fill="#1a1f2b"/>
    <rect x="0" y="18" width="140" height="10" fill="#1a1f2b"/>
    <line x1="0" y1="28" x2="140" y2="28" stroke="#2a3142"/>

    <text x="10" y="18" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="600" fill="#e6e9ef">📸 Captured</text>

    <!-- captured thumbnail -->
    <rect x="10" y="38" width="120" height="60" rx="4" fill="#1a2334" stroke="#2a3142"/>
    <rect x="14" y="44" width="6" height="48" fill="#6aa6ff" opacity="0.7"/>
    <rect x="22" y="56" width="6" height="36" fill="#6aa6ff" opacity="0.7"/>
    <rect x="30" y="48" width="6" height="44" fill="#6aa6ff" opacity="0.7"/>
    <rect x="38" y="42" width="6" height="50" fill="#4ade80" opacity="0.7"/>
    <rect x="46" y="50" width="6" height="42" fill="#6aa6ff" opacity="0.7"/>
    <rect x="54" y="46" width="6" height="46" fill="#6aa6ff" opacity="0.7"/>
    <rect x="62" y="38" width="6" height="54" fill="#4ade80" opacity="0.7"/>
    <rect x="70" y="34" width="6" height="58" fill="#4ade80" opacity="0.7"/>

    <text x="10" y="116" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">OCR · 12 numbers</text>
    <text x="10" y="128" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">found</text>

    <line x1="10" y1="138" x2="130" y2="138" stroke="#2a3142"/>

    <text x="10" y="154" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">PAiA:</text>
    <text x="10" y="170" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#e6e9ef">Q3 revenue grew</text>
    <text x="10" y="182" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#e6e9ef">23% YoY, with the</text>
    <text x="10" y="194" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#e6e9ef">strongest months</text>
    <text x="10" y="206" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#e6e9ef">being Jan and Feb…</text>
  </g>
</svg>
