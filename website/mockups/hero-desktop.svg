<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="PAiA running on a desktop with the ball and chat panel visible">
  <defs>
    <!-- desktop wallpaper gradient -->
    <linearGradient id="wp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#142037"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>

    <!-- ball gradient -->
    <radialGradient id="ball" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#bcd7ff"/>
      <stop offset="50%" stop-color="#6aa6ff"/>
      <stop offset="100%" stop-color="#1f3a6b"/>
    </radialGradient>

    <!-- panel surface -->
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2230"/>
      <stop offset="100%" stop-color="#161a22"/>
    </linearGradient>

    <!-- glow filter for the ball -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- soft shadow for floating elements -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── desktop wallpaper ────────────────────────────── -->
  <rect width="800" height="520" fill="url(#wp)"/>

  <!-- subtle dot pattern -->
  <g fill="#2a3142" opacity="0.4">
    <circle cx="80" cy="80" r="1"/>
    <circle cx="160" cy="120" r="1"/>
    <circle cx="240" cy="60" r="1"/>
    <circle cx="320" cy="180" r="1"/>
    <circle cx="120" cy="220" r="1"/>
    <circle cx="200" cy="280" r="1"/>
    <circle cx="40" cy="340" r="1"/>
    <circle cx="280" cy="400" r="1"/>
    <circle cx="600" cy="80" r="1"/>
    <circle cx="680" cy="160" r="1"/>
    <circle cx="720" cy="40" r="1"/>
    <circle cx="640" cy="240" r="1"/>
    <circle cx="760" cy="320" r="1"/>
    <circle cx="100" cy="460" r="1"/>
    <circle cx="700" cy="460" r="1"/>
  </g>

  <!-- desktop top menubar (decorative) -->
  <rect x="0" y="0" width="800" height="24" fill="rgba(0,0,0,0.3)"/>
  <text x="16" y="16" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#9b9a97">PAiA</text>
  <circle cx="760" cy="12" r="3" fill="#9b9a97"/>
  <circle cx="772" cy="12" r="3" fill="#9b9a97"/>
  <circle cx="784" cy="12" r="3" fill="#9b9a97"/>

  <!-- decorative window 1 (looks like a code editor) -->
  <g opacity="0.25" filter="url(#shadow)">
    <rect x="40" y="80" width="280" height="180" rx="8" fill="#0f1115" stroke="#2a3142"/>
    <rect x="40" y="80" width="280" height="22" rx="8" fill="#1a1f2b"/>
    <circle cx="54" cy="91" r="4" fill="#ff5f56"/>
    <circle cx="68" cy="91" r="4" fill="#ffbd2e"/>
    <circle cx="82" cy="91" r="4" fill="#27c93f"/>
    <line x1="56" y1="120" x2="220" y2="120" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="135" x2="180" y2="135" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="150" x2="240" y2="150" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="165" x2="160" y2="165" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="180" x2="200" y2="180" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="210" x2="220" y2="210" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="225" x2="140" y2="225" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- ── PAiA chat panel ──────────────────────────────── -->
  <g filter="url(#shadow)">
    <!-- panel frame -->
    <rect x="240" y="100" width="380" height="370" rx="12" fill="url(#panel)" stroke="#2a3142" stroke-width="1"/>

    <!-- header -->
    <rect x="240" y="100" width="380" height="42" rx="12" fill="#1d2230"/>
    <rect x="240" y="130" width="380" height="12" fill="#1d2230"/>
    <line x1="240" y1="142" x2="620" y2="142" stroke="#2a3142"/>

    <!-- header content -->
    <circle cx="262" cy="121" r="4" fill="#4ade80"/>
    <text x="276" y="125" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" font-weight="600" fill="#e6e9ef">PAiA</text>

    <!-- header dropdowns -->
    <rect x="380" y="111" width="100" height="20" rx="4" fill="#1a1f2b" stroke="#2a3142"/>
    <text x="388" y="125" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">🤖 Default</text>
    <rect x="486" y="111" width="80" height="20" rx="4" fill="#1a1f2b" stroke="#2a3142"/>
    <text x="494" y="125" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">llama3.2</text>

    <!-- header buttons -->
    <text x="572" y="125" font-family="sans-serif" font-size="14" fill="#aab3c5">📚</text>
    <text x="588" y="125" font-family="sans-serif" font-size="14" fill="#aab3c5">⚙</text>
    <text x="604" y="125" font-family="sans-serif" font-size="16" fill="#aab3c5">×</text>

    <!-- ── sidebar ─────────────────────────────────── -->
    <rect x="240" y="142" width="100" height="328" fill="#1d2230"/>
    <line x1="340" y1="142" x2="340" y2="470" stroke="#2a3142"/>

    <!-- new chat button -->
    <rect x="248" y="150" width="84" height="22" rx="4" fill="#6aa6ff"/>
    <text x="256" y="164" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="600" fill="#0a0d14">＋ New chat</text>

    <!-- sidebar items -->
    <rect x="244" y="180" width="92" height="34" rx="4" fill="rgba(106,166,255,0.18)"/>
    <text x="252" y="194" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="500" fill="#e6e9ef">Trip planning</text>
    <text x="252" y="206" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">2m · 14 msg</text>

    <rect x="244" y="218" width="92" height="34" rx="4" fill="transparent"/>
    <text x="252" y="232" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="500" fill="#aab3c5">Code review</text>
    <text x="252" y="244" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">1h · 8 msg</text>

    <rect x="244" y="256" width="92" height="34" rx="4" fill="transparent"/>
    <text x="252" y="270" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="500" fill="#aab3c5">Email draft</text>
    <text x="252" y="282" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">3h · 4 msg</text>

    <rect x="244" y="294" width="92" height="34" rx="4" fill="transparent"/>
    <text x="252" y="308" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="500" fill="#aab3c5">SQL queries</text>
    <text x="252" y="320" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">1d · 22 msg</text>

    <rect x="244" y="332" width="92" height="34" rx="4" fill="transparent"/>
    <text x="252" y="346" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="500" fill="#aab3c5">Travel ideas</text>
    <text x="252" y="358" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" fill="#8b94a7">2d · 6 msg</text>

    <!-- ── messages area ──────────────────────────── -->
    <!-- user message -->
    <rect x="430" y="158" width="180" height="40" rx="10" fill="rgba(106,166,255,0.18)"/>
    <text x="440" y="174" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#e6e9ef">Plan a 3-day trip to</text>
    <text x="440" y="188" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#e6e9ef">Tokyo for first-timers</text>

    <!-- assistant message -->
    <rect x="350" y="208" width="262" height="170" rx="10" fill="#1a2334" stroke="#2a3142"/>
    <text x="360" y="224" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" font-weight="600" fill="#e6e9ef">3 days in Tokyo — first-timer's loop</text>

    <text x="360" y="244" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">Day 1 — Asakusa &amp; Akihabara</text>
    <text x="368" y="258" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">• Morning: Senso-ji temple, Nakamise st.</text>
    <text x="368" y="270" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">• Afternoon: Akihabara electronics + arcades</text>
    <text x="368" y="282" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">• Evening: Yakitori under the train tracks</text>

    <text x="360" y="300" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">Day 2 — Shibuya &amp; Harajuku</text>
    <text x="368" y="314" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">• Morning: Meiji shrine + Yoyogi park</text>
    <text x="368" y="326" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">• Afternoon: Takeshita-dori, Omotesando</text>
    <text x="368" y="338" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">• Evening: Shibuya scramble + sky deck</text>

    <text x="360" y="356" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#aab3c5">Day 3 — Tsukiji &amp; teamLab Borderless</text>
    <text x="368" y="370" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">• Early breakfast at the outer market…</text>

    <!-- ── composer ─────────────────────────────────── -->
    <rect x="350" y="396" width="262" height="64" rx="6" fill="#1a1f2b" stroke="#2a3142"/>
    <text x="360" y="416" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">Ask PAiA…</text>
    <text x="360" y="430" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" fill="#8b94a7">(try / for commands)</text>

    <!-- composer buttons -->
    <text x="540" y="450" font-family="sans-serif" font-size="13" fill="#8b94a7">📎</text>
    <text x="556" y="450" font-family="sans-serif" font-size="13" fill="#8b94a7">🎙</text>
    <rect x="574" y="438" width="32" height="18" rx="4" fill="#6aa6ff"/>
    <text x="580" y="450" font-family="-apple-system,Segoe UI,sans-serif" font-size="10" font-weight="600" fill="#0a0d14">Send</text>
  </g>

  <!-- ── floating ball (in screen corner) ─────────────── -->
  <g transform="translate(700, 410)">
    <!-- pulse ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#6aa6ff" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#6aa6ff" stroke-width="1.5" opacity="0.25"/>
    <!-- glow -->
    <circle cx="0" cy="0" r="40" fill="#6aa6ff" opacity="0.3" filter="url(#glow)"/>
    <!-- core -->
    <circle cx="0" cy="0" r="32" fill="url(#ball)"/>
    <!-- specular highlight -->
    <ellipse cx="-10" cy="-12" rx="9" ry="5" fill="#ffffff" opacity="0.55"/>
    <ellipse cx="-12" cy="-15" rx="3" ry="2" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
