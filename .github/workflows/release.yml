name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Also upload to GitHub release matching the current tag (leave off for test builds)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pattern: 'paia-electron/release/*.exe'
          - os: macos-latest
            pattern: |
              paia-electron/release/*.dmg
              paia-electron/release/*-mac.zip
          - os: ubuntu-latest
            pattern: |
              paia-electron/release/*.AppImage
              paia-electron/release/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: paia-electron/package-lock.json

      - name: Install dependencies
        working-directory: paia-electron
        run: npm ci

      - name: Compile TypeScript + renderer
        working-directory: paia-electron
        run: npm run build

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: paia-electron
        run: npx electron-builder --win --publish=never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: paia-electron
        run: npx electron-builder --mac --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: paia-electron
        run: npx electron-builder --linux --publish=never

      - name: List produced artifacts
        working-directory: paia-electron
        shell: bash
        run: ls -lh release/ || true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paia-${{ matrix.os }}
          path: ${{ matrix.pattern }}
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.upload == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.pattern }}
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
